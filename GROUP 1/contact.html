<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - GROUP 1</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="shortcut icon" href="images/logo.png" type="image/x-icon">
    <style>
        .contact-form {
            max-width: 600px;
            margin: 50px auto;
            padding: 40px;
            background: #f9f9f9;
            border-radius: 10px;
            box-shadow: 0 0 20px 0px rgba(0, 0, 0, 0.1);
        }

        .contact-form h2 {
            text-align: center;
            color: rgb(98, 19, 224);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            box-sizing: border-box;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 150px;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: blue;
            box-shadow: 0 0 5px rgba(0, 0, 255, 0.3);
        }

        .submit-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: blue;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.5s;
        }

        .submit-btn:hover {
            background: lightskyblue;
        }

        .contact-info {
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
            text-align: center;
        }

        .contact-info h2 {
            color: rgb(98, 19, 224);
            margin-bottom: 30px;
        }

        .contact-methods {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            margin-top: 40px;
        }

        .contact-method {
            flex: 1;
            min-width: 200px;
            margin: 20px;
            padding: 20px;
            background: #f0f0f0;
            border-radius: 8px;
        }

        .contact-method i {
            font-size: 40px;
            color: darkorange;
            margin-bottom: 15px;
        }

        .contact-method h3 {
            color: rgb(98, 19, 224);
            margin-bottom: 10px;
        }

        .contact-method p {
            color: #555;
        }

        .contact-method a {
            color: blue;
            text-decoration: none;
        }

        .contact-method a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="container">
            <div class="navbar">
                <div class="logo">
                    <a href="index.html"> <img src="images/logo.png" alt="GTI" width="100px"></a>
                </div>
        
                <nav>
                    <ul id="MenuItems">
                        <li><a href="index.html"><strong>Home</strong></a></li>
                        <li><a href="contact.html"><strong>Contact</strong></a></li>
                        <li><a href="about.html"><strong>About</strong></a></li>  
                    </ul>
                </nav>

                <img src="images/menu.png" alt="menu" class="menu-icon" onclick="menutoggle()">
            </div>

            <div class="row">
                <div class="col-1">
                    <h1>Contact Us</h1>
                    <p>INTRODUCTION TO CLOUD COMPUTING <br> CSRC 252</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Contact Section -->
    <div class="categories">
        <div class="contact-form" style="text-align: center;">
            <h2>Send us a Message</h2>
            <a href="mailto:ibrakadabrahjnr@gmail.com?subject=Message from Contact Form" class="submit-btn" style="display: inline-block; text-align: center; text-decoration: none; width: auto; margin-top: 20px;">
                Send Email
            </a>
            <p style="text-align: center; margin-top: 20px; color: #666; font-size: 14px;">Click the button above to send us an email, or use the contact information below.</p>
        </div>
    </div>

    <!-- Contact Information Section -->
    <div class="contact-info">
        <h2>Other Ways to Reach Us</h2>
        
        <div class="contact-methods">
            <div class="contact-method">
                <i class="fa fa-envelope"></i>
                <h3>Email</h3>
                <p><a href="mailto:ibrakadabrahjnr@gmail.com">ibrakadabrahjnr@gmail.com</a></p>
            </div>

            <div class="contact-method">
                <i class="fa fa-phone"></i>
                <h3>Phone</h3>
                <p><a href="tel:+233548740949">+233 548 740 949</a></p>
            </div>
        </div>
    </div>

    <!--Java script for toggle menu-->
    <script>
        var MenuItems = document.getElementById("MenuItems") 

        MenuItems.style.maxHeight = "0px"

        function menutoggle()
        {
            if(MenuItems.style.maxHeight == "0px")
            {
                MenuItems.style.maxHeight = "200px"
            }
            else
            {
                MenuItems.style.maxHeight = "0px"
            }
        }
    </script>

</body>    
</html>
